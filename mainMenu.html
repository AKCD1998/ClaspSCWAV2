<!-- SCREEN CHOOSER -->
<div class="container pushable" id="screen-chooser">
  <h2 style="text-align:center">กรุณาเลือกการใช้งาน</h2>
  <div class="grid">
    <div class="card">
      <h3>จำหน่ายยาโดยเภสัชกร</h3>
      <button class="btn btn--go" onclick="openPosApp()">เริ่มต้นใช้งาน</button>
    </div>
    <div class="card">
      <h3>สำหรับกรอกข้อมูล</h3>
      <button class="btn" onclick="goLookup()">เริ่มต้นใช้งาน</button>
    </div>
    <!-- Rx1011 Movements -->
    <div class="card">
      <h3>บันทึกรับเข้า/โอน/ขาย (Rx1011)</h3>
      <button class="btn" onclick="openRx1011()">เริ่มต้นใช้งาน</button>
    </div>
  </div>
</div>
