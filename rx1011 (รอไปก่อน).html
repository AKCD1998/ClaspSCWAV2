  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 12px; }

    /* --- rx1011: utilities --- */
    .is-hidden{display:none !important}
    .text-center{text-align:center}
    .text-right{text-align:right}

    /* --- rx1011: layout & cards --- */
    .rx1011-grid{display:grid}
    .rx1011-card{border:1px solid #2b2c2e;border-radius:10px;padding:12px}

    /* --- rx1011: inputs --- */
    .rx1011-input{width:100%;padding:8px;border-radius:8px;border:1px solid #334155;background:#0b1424;color:#e5e7eb}

    /* --- rx1011: buttons --- */
    .rx1011-btn{padding:10px 12px;border-radius:10px;border:1px solid #2b2c2e;background:#243447;color:#e5e7eb;cursor:pointer}
    .rx1011-btn--accent{background:#1BB89D;color:#0b1424;border-color:#0e7d6a}
    .rx1011-btn--go{background:#22c55e;color:#0b1424;border-color:#15803d}
    .rx1011-btn--warn{background:#ef4444;color:#fff;border-color:#b91c1c}
    .rx1011-btn--note{background:#facc15;color:#111;border-color:#d1a30a}

    /* --- rx1011: table (POS-like) --- */
    .rx1011-table .rx1011-thead{
      display:grid;
      grid-template-columns:80px 120px 1fr 200px 140px;
      gap:8px;padding:10px;
      background:linear-gradient(#0e2a3b,#0b1f2a);
      color:#e5e7eb;border-radius:8px
    }
    .rx1011-table .rx1011-tbody{display:grid;gap:8px;padding:8px}
    .rx1011-table .rx1011-row{
      display:grid;
      grid-template-columns:80px 120px 1fr 200px 140px;
      gap:8px;align-items:center
    }

    /* --- rx1011: icon button --- */
    .rx1011-iconbtn{padding:8px;border-radius:8px;border:1px solid #2b2c2e;background:#243447;color:#e5e7eb;cursor:pointer}
    .rx1011-iconbtn svg, .rx1011-iconbtn svg *{pointer-events:none} /* so clicks hit the button */

    /* --- rx1011: AMED-style detail grid (renamed generic) --- */
    .rx1011-head{
      display:grid;grid-template-columns:140px 1fr 1fr 50px;gap:8px;
      padding:10px;background:linear-gradient(#0e2a3b,#0b1f2a);
      border-radius:8px;color:#e5e7eb
    }
    .rx1011-rows{display:grid;gap:8px}
    .rx1011-row--detail{
      display:grid;grid-template-columns:140px 1fr 1fr 50px;
      gap:8px;align-items:start;margin:6px 0
    }
    .rx1011-col{display:grid;grid-template-columns:1fr auto;gap:8px}
    .rx1011-label{min-width:260px;opacity:.8}
    .rx1011-row--detail textarea{flex:1}

  </style>
  <style>

  <!-- โหลด UMD ของ Supabase (ต้องเป็น UMD เพื่อให้มี window.supabase) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    // ===== Fixed Supabase wiring (GAS injects these) =====
    const SUPABASE_URL = '<?= SUPABASE_URL ?>';
    const SUPABASE_KEY = '<?= SUPABASE_KEY ?>';

    // ป้องกันปัญหาถ้า CDN โหลดไม่สำเร็จ
    (function guardAndWire(){
      const status = (ok, txt) => {
        const el = document.getElementById('connStatus');
        if (!el) return;
        el.innerHTML = `<div class="${ok?'ok':'err'}">${txt}</div>`;
      };

      try{
        const { createClient } = (window.supabase || {});
        if (!createClient){
          status(false, 'ไม่พบ UMD ของ Supabase (window.supabase) – ตรวจสอบ CDN');
          return;
        }
        if (!SUPABASE_URL || !SUPABASE_KEY){
          status(false, 'SUPABASE_URL / SUPABASE_KEY ไม่ถูกส่งมาจาก GAS');
          return;
        }
        window.supa = createClient(SUPABASE_URL, SUPABASE_KEY); // ใช้เป็น global ให้ handler อื่น
        status(true, 'เชื่อมต่อ Supabase สำเร็จ ✅');
      }catch(e){
        console.error(e);
        status(false, String(e && e.message || e));
      }
    })();
  </script>
